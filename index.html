<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Entregador Premium</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:
linear-gradient(
180deg,
#0f172a,
#111827,
#1e3a8a
);

color:white;

padding:18px;

min-height:100vh;
}

.card{

background:
rgba(15,23,42,0.82);

backdrop-filter:blur(14px);

padding:22px;

border-radius:28px;

margin-bottom:20px;

border:
1px solid rgba(255,255,255,0.08);

box-shadow:
0 10px 35px rgba(0,0,0,0.35);
}

h1,h2{

font-weight:800;

letter-spacing:0.5px;
}

input,
button{

width:100%;

padding:16px;

border:none;

border-radius:18px;

margin-top:12px;

font-size:16px;
}

input{

background:
rgba(255,255,255,0.08);

color:white;

outline:none;

border:
1px solid rgba(255,255,255,0.08);
}

input::placeholder{
color:#cbd5e1;
}

button{

background:
linear-gradient(
90deg,
#2563eb,
#7c3aed
);

color:white;

font-weight:bold;

cursor:pointer;

transition:0.3s;
}

button:hover{

transform:scale(1.02);

opacity:0.95;
}

.pedido{

background:
linear-gradient(
180deg,
#1e293b,
#0f172a
);

padding:18px;

border-radius:24px;

margin-top:18px;

border:
1px solid rgba(255,255,255,0.08);

position:relative;

overflow:hidden;
}

.pedido::before{

content:"";

position:absolute;

top:0;

left:0;

width:100%;

height:5px;

background:
linear-gradient(
90deg,
#2563eb,
#7c3aed
);
}

img{

width:100%;

border-radius:18px;

margin-top:14px;

max-height:280px;

object-fit:cover;

border:
2px solid rgba(255,255,255,0.08);
}

.hidden{
display:none !important;
}

.online{

display:inline-block;

margin-top:8px;

padding:7px 14px;

border-radius:30px;

font-weight:bold;

background:
rgba(34,197,94,0.15);

color:#22c55e;
}

.offline{

display:inline-block;

margin-top:8px;

padding:7px 14px;

border-radius:30px;

font-weight:bold;

background:
rgba(239,68,68,0.15);

color:#ef4444;
}

.perfil{

display:flex;

align-items:center;

gap:14px;

margin-bottom:20px;
}

.avatar{

width:70px;

height:70px;

border-radius:50%;

background:
linear-gradient(
135deg,
#2563eb,
#7c3aed
);

display:flex;

align-items:center;

justify-content:center;

font-size:30px;

font-weight:bold;

color:white;

border:
3px solid rgba(255,255,255,0.12);

box-shadow:
0 0 25px rgba(37,99,235,0.5);
}

.infoPerfil h3{

font-size:22px;

margin-bottom:4px;
}

.infoPerfil p{

color:#cbd5e1;

font-size:14px;
}

.ganhosBox{

margin-top:20px;

padding:20px;

border-radius:24px;

background:
linear-gradient(
135deg,
#2563eb,
#7c3aed
);

text-align:center;
}

.ganhosBox h1{

font-size:40px;

margin-top:10px;
}

.statusPedido{

display:inline-block;

margin-top:10px;

padding:8px 14px;

border-radius:30px;

background:
rgba(255,255,255,0.08);

font-weight:bold;
}

.modalImagem{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:
rgba(0,0,0,0.92);

display:none;

align-items:center;

justify-content:center;

z-index:9999;

padding:20px;
}

.modalImagem img{

width:100%;

max-width:900px;

max-height:95vh;

border-radius:20px;

object-fit:contain;
}

</style>
</head>
<body>

<div
class="card"
id="cardLogin"
>

<h1>
Entregador Premium
</h1>

<input
type="text"
id="nome"
placeholder="Nome"
/>

<input
type="email"
id="email"
placeholder="Email"
/>

<input
type="password"
id="senha"
placeholder="Senha"
/>

<button id="btnCadastrar">
Cadastrar
</button>

<button id="btnLogin">
Entrar
</button>

<button
id="btnSair"
class="hidden"
style="
background:
linear-gradient(
90deg,
#ef4444,
#dc2626
);
"
>
Sair
</button>

</div>

<div
class="card hidden"
id="cardPedidos"
>

<div class="perfil">

<div class="avatar">
🚴
</div>

<div class="infoPerfil">

<h3 id="nomePerfil">
Entregador
</h3>

<p>
Painel Premium de Entregas
</p>

</div>

</div>

<h2>
Pedidos
</h2>

<div id="pedidos"></div>

<div class="ganhosBox">

<h2>
💰 Ganhos do entregador
</h2>

<h1 id="totalGanhos">
R$ 0,00
</h1>

<p id="quantidadePedidos">
0 pedidos finalizados
</p>

</div>

</div>

<div
class="modalImagem"
id="modalImagem"
onclick="
this.style.display='none'
"
>

<img id="imagemGrande">

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
set,
onValue,
update,
onDisconnect
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:
"AIzaSyDrtZxbKXk7hjlqBL_BLoZMTBdc5iqBCXo",

authDomain:
"ferramentas-projeto.firebaseapp.com",

databaseURL:
"https://ferramentas-projeto-default-rtdb.firebaseio.com",

projectId:
"ferramentas-projeto",

storageBucket:
"ferramentas-projeto.appspot.com",

messagingSenderId:
"877191590019",

appId:
"1:877191590019:web:152d4d35bdd3024c53abb6"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getDatabase(app);

const nome =
document.getElementById("nome");

const email =
document.getElementById("email");

const senha =
document.getElementById("senha");

const btnCadastrar =
document.getElementById("btnCadastrar");

const btnLogin =
document.getElementById("btnLogin");

const btnSair =
document.getElementById("btnSair");

const pedidos =
document.getElementById("pedidos");

const cardPedidos =
document.getElementById("cardPedidos");

const totalGanhos =
document.getElementById("totalGanhos");

const quantidadePedidos =
document.getElementById("quantidadePedidos");

const nomePerfil =
document.getElementById("nomePerfil");

btnCadastrar.onclick =
async ()=>{

try{

if(
!nome.value ||
!email.value ||
!senha.value
){

alert("Preencha todos os campos");

return;

}

const userCredential =
await createUserWithEmailAndPassword(
auth,
email.value,
senha.value
);

const user =
userCredential.user;

await set(
ref(db,"entregadores/" + user.uid),
{

uid:user.uid,

nome:nome.value,

email:email.value,

online:true,

ultimoAcesso:Date.now(),

createdAt:Date.now()

}
);

alert("Cadastro realizado");

}catch(error){

console.log(error);

if(
error.code ===
"auth/email-already-in-use"
){

alert("Email já cadastrado");

}else{

alert(error.message);

}

}

};

btnLogin.onclick =
async ()=>{

try{

await signInWithEmailAndPassword(
auth,
email.value,
senha.value
);

const user =
auth.currentUser;

await update(
ref(db,"entregadores/" + user.uid),
{
online:true
}
);

const pedidosRef =
ref(db,"pedidos");

onValue(pedidosRef,(snapshot)=>{

snapshot.forEach(async (docu)=>{

const item =
docu.val();

if(item.entregadorId === user.uid){

await update(
ref(db,"pedidos/" + docu.key),
{
entregadorOnline:true
}
);

}

});

});

alert("Login realizado");

}catch(error){

console.log(error);

alert("Email ou senha incorretos");

}

};

function buscarPedidos(){

const user =
auth.currentUser;

if(!user){
return;
}

const pedidosRef =
ref(db,"pedidos");

onValue(pedidosRef,(snapshot)=>{

pedidos.innerHTML = "";

let total = 0;

let quantidade = 0;

if(!snapshot.exists()){

pedidos.innerHTML = `
<p>
Nenhum pedido encontrado
</p>
`;

return;

}

snapshot.forEach((docu)=>{

const item =
docu.val();

if(
item &&
item.entregadorId === user.uid
){

if(item.status === "entregue"){

total += 2.50;

quantidade++;

}

pedidos.innerHTML += `

<div class="pedido">

<h2>
Cliente
</h2>

<p>
${item.descricao || ''}
</p>

<p>
📞 ${item.telefone || ''}
</p>

<p>
📍 ${item.endereco || ''}
</p>

<p class="statusPedido">

📦 Status:
${item.status || 'aguardando'}

</p>

<p class="
${item.entregadorOnline ? 'online' : 'offline'}
">

${item.entregadorOnline
? '🟢 Online'
: '🔴 Offline'}

</p>

${
item.fotoPedido
?
`
<img
src="${item.fotoPedido}"
onclick="
window.abrirImagem(
'${item.fotoPedido}'
)
"
style="
cursor:pointer;
"
/>
`
:
''
}

${
item.status !== "entregue"
?
`

<button
onclick="window.atualizarPedido('${docu.key}','aceito')"
>
Aceitar
</button>

<button
onclick="window.atualizarPedido('${docu.key}','entregando')"
>
Saiu para entrega
</button>

<button
onclick="window.atualizarPedido('${docu.key}','entregue')"
>
Finalizar
</button>

`
:
`

<div
style="
margin-top:15px;
padding:12px;
background:#22c55e;
border-radius:12px;
text-align:center;
font-weight:bold;
"
>

Pedido finalizado

</div>

`
}

</div>

`;

}

});

totalGanhos.innerHTML =
"R$ " + total.toFixed(2);

quantidadePedidos.innerHTML =
quantidade + " pedidos finalizados";

});

}

window.atualizarPedido =
async function(id,status){

try{

const user =
auth.currentUser;

await update(
ref(db,"pedidos/" + id),
{
status:status,
entregadorOnline:true
}
);

alert("Status atualizado");

}catch(error){

alert(error.message);

}

};

window.abrirImagem =
function(url){

document.getElementById(
"modalImagem"
).style.display = "flex";

document.getElementById(
"imagemGrande"
).src = url;

};

btnSair.onclick =
async ()=>{

try{

const user =
auth.currentUser;

const pedidosRef =
ref(db,"pedidos");

onValue(pedidosRef,(snapshot)=>{

snapshot.forEach(async (docu)=>{

const item =
docu.val();

if(item.entregadorId === user.uid){

await update(
ref(db,"pedidos/" + docu.key),
{
entregadorOnline:false
}
);

}

});

},{
onlyOnce:true
});

await update(
ref(db,"entregadores/" + user.uid),
{
online:false
}
);

await signOut(auth);

location.reload();

}catch(error){

console.log(error);

}

};

onAuthStateChanged(auth,(user)=>{

if(user){

nome.classList.add("hidden");

email.classList.add("hidden");

senha.classList.add("hidden");

btnCadastrar.classList.add("hidden");

btnLogin.classList.add("hidden");

btnSair.classList.remove("hidden");

cardPedidos.classList.remove("hidden");

nomePerfil.innerHTML =
nome.value || "Entregador";

buscarPedidos();

}else{

nome.classList.remove("hidden");

email.classList.remove("hidden");

senha.classList.remove("hidden");

btnCadastrar.classList.remove("hidden");

btnLogin.classList.remove("hidden");

btnSair.classList.add("hidden");

cardPedidos.classList.add("hidden");

pedidos.innerHTML = "";

totalGanhos.innerHTML =
"R$ 0,00";

quantidadePedidos.innerHTML =
"0 pedidos finalizados";

}

});

</script>
</body>
  </html>
